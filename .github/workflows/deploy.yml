name: Deploy to AWS EC2

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/micsu-app:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_ELASTIC_IP }}      # Dùng Elastic IP cố định trên EC2
        username: ubuntu                         # Username của EC2 Ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}          # Nội dung file .pem private key
        script: |
          mkdir -p ~/micsu/nginx/ssl
          mkdir -p ~/micsu/nginx/conf.d
          cd ~/micsu
          
          # Lưu ý: Cần sync các file docker-compose.yml và thư mục nginx lên EC2 thủ công hoặc dùng rsync trong step trước.
          # (Có thể tham khảo: https://github.com/appleboy/scp-action để copy config file qua SSH trước khi deploy)
          
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Kéo image mới về
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/micsu-app:latest
          
          # Update lại docker-compose
          docker compose down
          docker compose up -d
          
          docker system prune -f
