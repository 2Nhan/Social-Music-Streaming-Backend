spring:
  application:
    name: micsu
  datasource:
    url: "jdbc:mysql://localhost:3306/music_player"
    username: root
    password: ${DB_PASSWORD}
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
server:
  port: 8081
  servlet:
    context-path: /micsu
storage:
  r2:
    accountId: ${R2_ACCOUNT_ID}
    accessKey: ${R2_ACCESS_KEY}
    secretKey: ${R2_SECRET_KEY}
    mBucket: ${R2_BUCKET}
    endpoint: https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
    iBucket: image-bucket
    publicDomain: https://crmsoft.site
