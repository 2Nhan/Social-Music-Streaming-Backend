# Redis Configuration for Like Counter Service
# Production-ready setup for high-throughput music streaming platform

# ─────────────────────────────────────────────────────────────────
# 1. Memory Management & Eviction Policy
# ─────────────────────────────────────────────────────────────────
# Set max memory to 2GB (adjust based on your infrastructure)
maxmemory 2gb

# Eviction policy: LRU with TTL consideration
# - Evicts keys based on Least Recently Used pattern when memory is full
# - Works in conjunction with application-level TTL (Sliding Window)
# - Protects against Thundering Herd by keeping hot data in cache
maxmemory-policy allkeys-lru

# Memory sample size for LRU approximation (default: 5)
# Higher values = more accurate LRU but slower operations
maxmemory-samples 10

# ─────────────────────────────────────────────────────────────────
# 2. Persistence Settings
# ─────────────────────────────────────────────────────────────────
# RDB Snapshot - Save to disk periodically
# Format: save <seconds> <changes>
# This saves if X changes happen within Y seconds
save 900 1        # Save if 1 key changes in 900 seconds (15 min)
save 300 10       # Save if 10 keys change in 300 seconds (5 min)
save 60 10000     # Save if 10k keys change in 60 seconds (1 min)

# RDB file location
dir /var/lib/redis
dbfilename dump.rdb

# AOF (Append-Only File) - Log all write operations
# Use AOF for better durability in production
appendonly yes
appendfilename "appendonly.aof"

# AOF rewrite policy
# Rewrite AOF if it grows 100% larger than the base file or every 24 hours
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ─────────────────────────────────────────────────────────────────
# 3. Network & Connection Settings
# ─────────────────────────────────────────────────────────────────
# Bind to all interfaces (adjust for security)
bind 0.0.0.0

# Redis port
port 6379

# TCP backlog
tcp-backlog 511

# Client timeout (0 = never)
timeout 0

# TCP keepalive interval
tcp-keepalive 300

# ─────────────────────────────────────────────────────────────────
# 4. Replication Settings (for HA setup)
# ─────────────────────────────────────────────────────────────────
# For single-instance setup, leave as-is
# For replication, configure slave-of or replicaof

# Replication backlog size (for partial resync)
repl-backlog-size 1mb
repl-backlog-ttl 3600

# ─────────────────────────────────────────────────────────────────
# 5. Logging
# ─────────────────────────────────────────────────────────────────
# Logging level: debug, verbose, notice, warning
loglevel notice

# Log file (empty string = stdout)
logfile ""

# ─────────────────────────────────────────────────────────────────
# 6. Slow Query Log
# ─────────────────────────────────────────────────────────────────
# Commands slower than this threshold (microseconds) are logged
slowlog-log-slower-than 10000

# Max length of slow log
slowlog-max-len 128

# ─────────────────────────────────────────────────────────────────
# 7. Advanced Settings for Like Service
# ─────────────────────────────────────────────────────────────────
# Lua script timeout (milliseconds)
# Prevents runaway Lua scripts
lua-time-limit 5000

# Lazyfree settings for better performance on large key deletes
# Use lazy free for non-blocking deletion
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ─────────────────────────────────────────────────────────────────
# 8. Notes for Like Service Architecture
# ─────────────────────────────────────────────────────────────────
# Key Naming Convention:
#   - Like Sets: song:{songId}:likes (Redis Set, contains userIds)
#   - Modified Flag: songs:likes_modified (Redis ZSET, tracks dirty songs)
#
# TTL Strategy (Application Level):
#   - All keys auto-expire after 7 days (LikeConstants.LIKE_CACHE_TTL_SECONDS)
#   - Sliding Window: Every read/write extends TTL to prevent premature eviction
#   - Infrastructure LRU: If memory full, LRU evicts least-used data
#
# Sync Strategy (Batch Job - LikeSyncScheduler):
#   - Every 5 minutes: Query songs:likes_modified for dirty songs
#   - For each dirty song: SCARD to get like count from Redis Set
#   - Batch UPDATE favorite_count in MySQL
#   - Clean up: ZREMRANGEBYSCORE to remove dirty flags
#   - DO NOT delete song:{songId}:likes - keep for TTL/LRU management
#
# Lock Strategy (Thundering Herd Protection):
#   - Redisson distributed lock on cache miss (like:lock:{songId}:reload)
#   - Only lock holder queries database to reload like list
#   - Lock holder populates Redis Set, others wait then read from cache
#
# Performance Targets:
#   - Like/Unlike: < 10ms (Lua script + Redis Set operations)
#   - Get Like Count: < 5ms (Redis SCARD)
#   - Batch Sync: < 100ms per 100 songs (depends on DB speed)
