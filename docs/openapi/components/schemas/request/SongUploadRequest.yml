type: object
required:
  - title
  - audioFile
  - genreName
properties:
  title:
    type: string
    description: Song title.
  description:
    type: string
    nullable: true
    description: Optional song description.
  imageFile:
    type: string
    format: binary
    description: Cover image file (optional).
  audioFile:
    type: string
    format: binary
    description: Audio file (MP3).
  genreName:
    $ref: '../response/GenreName.yml'
  visibility:
    $ref: '../response/Visibility.yml'
