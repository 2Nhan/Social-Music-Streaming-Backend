type: object
required:
  - username
  - email
  - password
properties:
  username:
    type: string
    minLength: 3
    maxLength: 50
    description: Desired username (3–50 characters).
  email:
    type: string
    format: email
    description: User's email address.
  password:
    type: string
    minLength: 6
    description: Password (minimum 6 characters).
