type: object
description: Standard API response wrapper used by all endpoints.
required:
  - success
  - timestamp
properties:
  success:
    type: boolean
    description: Whether the request was successful.
  message:
    type: string
    description: Human-readable message describing the result.
  data:
    description: >-
      The response payload. The type varies per endpoint.
      Omitted (null) on error responses.
  timestamp:
    type: string
    description: ISO 8601 timestamp of the response.
    example: "2026-04-01T17:00:00+07:00"
