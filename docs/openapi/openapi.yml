openapi: 3.0.3

info:
  title: Micsu – Music Streaming API
  description: >-
    RESTful API for the Micsu music streaming platform.
    Provides endpoints for authentication, song management, playlist management,
    social features (likes, comments, reposts, follows), user profiles, and
    listening history.
  version: 1.1.0
  contact:
    name: TuNhan

servers:
  - url: http://localhost:8081/micsu
    description: Local development server
  - url: https://pj2.crmsoft.site/micsu
    description: Production server

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Registration, login, token refresh, and logout.
  - name: Songs
    description: Song upload, retrieval, update, deletion, and HLS streaming.
  - name: Genres
    description: Music genres and genre-based song discovery.
  - name: Search
    description: Song search and autocomplete.
  - name: Comments
    description: Song comments (add, list, delete).
  - name: Likes
    description: Like songs.
  - name: Views
    description: Song view tracking.
  - name: Follow
    description: Follow/unfollow users.
  - name: Playlists
    description: Playlist CRUD and song management within playlists.
  - name: Reposts
    description: Repost/unrepost songs.
  - name: Users
    description: User profiles, songs, followers, following, and reposts.
  - name: History
    description: Listening history.

paths:
  # ── Auth ──────────────────────────────────────────────────
  /api/v1/auth/register:
    $ref: "./paths/auth.yml#/Register"
  /api/v1/auth/login:
    $ref: "./paths/auth.yml#/Login"
  /api/v1/auth/refresh:
    $ref: "./paths/auth.yml#/Refresh"
  /api/v1/auth/logout:
    $ref: "./paths/auth.yml#/Logout"

  # ── Songs ─────────────────────────────────────────────────
  /api/v1/songs:
    $ref: "./paths/songs.yml#/SongsCollection"
  /api/v1/songs/upload:
    $ref: "./paths/songs.yml#/UploadSong"
  /api/v1/songs/uploadV2:
    $ref: "./paths/songs.yml#/UploadSongV2"
  /api/v1/songs/{id}:
    $ref: "./paths/songs.yml#/SongById"
  /api/v1/songs/{songId}/stream/master.m3u8:
    $ref: "./paths/songs.yml#/StreamHls"
  /api/v1/genres:
    $ref: "./paths/genres.yml#/GenresCollection"
  /api/v1/genres/{genreId}/songs:
    $ref: "./paths/genres.yml#/GenreSongs"

  # ── Search ────────────────────────────────────────────────
  /api/v1/search:
    $ref: "./paths/search.yml#/SearchResults"
  /api/v1/search/autocomplete:
    $ref: "./paths/search.yml#/AutocompleteSearch"

  # ── Comments ──────────────────────────────────────────────
  /api/v1/songs/{songId}/comments:
    $ref: "./paths/comments.yml#/SongComments"
  /api/v1/comments/{id}:
    $ref: "./paths/comments.yml#/DeleteComment"

  # ── Likes ─────────────────────────────────────────────────
  /api/v1/likes/songs/{songId}:
    $ref: "./paths/likes.yml#/Like"
  /api/v1/likes/songs:
    $ref: "./paths/likes.yml#/LikedSongs"
  /api/v1/views/songs/{songId}:
    $ref: "./paths/views.yml#/SongView"

  # ── Follow ────────────────────────────────────────────────
  /api/v1/follow/{userId}:
    $ref: "./paths/follow.yml#/FollowUser"

  # ── Playlists ─────────────────────────────────────────────
  /api/v1/playlists:
    $ref: "./paths/playlists.yml#/PlaylistCollection"
  /api/v1/playlists/public:
    $ref: "./paths/playlists.yml#/PlaylistPublic"
  /api/v1/playlists/{id}:
    $ref: "./paths/playlists.yml#/PlaylistById"
  /api/v1/playlists/{id}/visibility:
    $ref: "./paths/playlists.yml#/PlaylistVisibility"
  /api/v1/playlists/{id}/songs:
    $ref: "./paths/playlists.yml#/PlaylistSongs"
  /api/v1/playlists/{id}/songs/{songId}:
    $ref: "./paths/playlists.yml#/PlaylistSongById"

  # ── Reposts ───────────────────────────────────────────────
  /api/v1/songs/{songId}/repost:
    $ref: "./paths/reposts.yml#/SongRepost"

  # ── Users ─────────────────────────────────────────────────
  /api/v1/users/{id}:
    $ref: "./paths/users.yml#/UserById"
  /api/v1/users/{id}/songs:
    $ref: "./paths/users.yml#/UserSongs"
  /api/v1/users/{id}/playlists:
    $ref: "./paths/users.yml#/UserPlaylists"
  /api/v1/users/{id}/playlists/public:
    $ref: "./paths/users.yml#/UserPublicPlaylists"
  /api/v1/users/{id}/followers:
    $ref: "./paths/users.yml#/UserFollowers"
  /api/v1/users/{id}/following:
    $ref: "./paths/users.yml#/UserFollowing"
  /api/v1/users/{id}/reposts:
    $ref: "./paths/users.yml#/UserReposts"

  # ── History / Me ──────────────────────────────────────────
  /api/v1/users/me/playlists:
    $ref: "./paths/users.yml#/MyPlaylists"
  /api/v1/users/me/history/{songId}:
    $ref: "./paths/history.yml#/LogListen"
  /api/v1/users/me/history:
    $ref: "./paths/history.yml#/GetHistory"

components:
  securitySchemes:
    BearerAuth:
      $ref: "./components/securitySchemes.yml#/BearerAuth"

  schemas:
    # ── Request DTOs ──
    LoginRequest:
      $ref: "./components/schemas/request/LoginRequest.yml"
    RegisterRequest:
      $ref: "./components/schemas/request/RegisterRequest.yml"
    RefreshTokenRequest:
      $ref: "./components/schemas/request/RefreshTokenRequest.yml"
    CommentRequest:
      $ref: "./components/schemas/request/CommentRequest.yml"
    PlaylistRequest:
      $ref: "./components/schemas/request/PlaylistRequest.yml"
    PlaylistVisibilityRequest:
      $ref: "./components/schemas/request/PlaylistVisibilityRequest.yml"
    AddSongToPlaylistRequest:
      $ref: "./components/schemas/request/AddSongToPlaylistRequest.yml"
    SongUploadRequest:
      $ref: "./components/schemas/request/SongUploadRequest.yml"
    SongUpdateRequest:
      $ref: "./components/schemas/request/SongUpdateRequest.yml"
    UpdateProfileRequest:
      $ref: "./components/schemas/request/UpdateProfileRequest.yml"

    # ── Response DTOs ──
    ApiResponse:
      $ref: "./components/schemas/response/ApiResponse.yml"
    ErrorResponse:
      $ref: "./components/schemas/response/ErrorResponse.yml"
    AuthResponse:
      $ref: "./components/schemas/response/AuthResponse.yml"
    GenreResponse:
      $ref: "./components/schemas/response/GenreResponse.yml"
    CommentResponse:
      $ref: "./components/schemas/response/CommentResponse.yml"
    LikeResponse:
      $ref: "./components/schemas/response/LikeResponse.yml"
    PlaylistResponse:
      $ref: "./components/schemas/response/PlaylistResponse.yml"
    RepostResponse:
      $ref: "./components/schemas/response/RepostResponse.yml"
    SongResponse:
      $ref: "./components/schemas/response/SongResponse.yml"
    SongDetailResponse:
      $ref: "./components/schemas/response/SongDetailResponse.yml"
    UserProfileResponse:
      $ref: "./components/schemas/response/UserProfileResponse.yml"
    ListeningHistoryResponse:
      $ref: "./components/schemas/response/ListeningHistoryResponse.yml"
    PageResponse:
      $ref: "./components/schemas/response/PageResponse.yml"

    # ── Enums ──
    TargetType:
      $ref: "./components/schemas/response/TargetType.yml"
    GenreName:
      $ref: "./components/schemas/response/GenreName.yml"
    Visibility:
      $ref: "./components/schemas/response/Visibility.yml"
