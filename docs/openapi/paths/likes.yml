# Like endpoints from LikeController
# ─────────────────────────────────────────────────────────────────────────────
# Released in this version (DB-only flow, no Redis):
#   POST   /api/v1/likes/songs/{songId}  → Like
#   DELETE /api/v1/likes/songs/{songId}  → Unlike
#   GET    /api/v1/likes/songs           → LikedSongs (authenticated user only)
#
# Intentionally NOT published in this release (Redis-based flows — preserved in
# service layer for future use):
#   POST   /api/v1/like/songs/{songId}    (LikeAlias  – Redis flow, deprecated)
#   DELETE /api/v1/unlike/songs/{songId}  (UnlikeAlias – Redis flow, deprecated)
#   POST   /api/v2/like/songs/{songId}    (LikeV2     – Redis flow)
# ─────────────────────────────────────────────────────────────────────────────

Like:
  post:
    tags: [Likes]
    summary: Like a song
    description: >-
      Like a song by id using canonical endpoint.
      Returns updated `SongResponse` with `isFavorited=true`.
    operationId: likeSong
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "200":
        description: Song liked successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/SongResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "409":
        description: Song already liked.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
  delete:
    tags: [Likes]
    summary: Unlike a song
    description: >-
      Remove the authenticated user's like from a song using canonical endpoint.
      Returns updated `SongResponse` with `isFavorited=false`.
    operationId: unlikeSong
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "200":
        description: Song unliked successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/SongResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: Song not found or song has not been liked by the authenticated user.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

LikedSongs:
  get:
    tags: [Likes]
    summary: Get liked songs of the current user
    description: >-
      Returns a paginated list of songs liked by the currently authenticated user.
      The user identity is derived exclusively from the Bearer JWT token —
      it is not possible to query another user's liked songs through this endpoint.
    operationId: getUserLikedSongs
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          default: 0
        description: Zero-based page index.
      - in: query
        name: size
        required: false
        schema:
          type: integer
          default: 20
        description: Number of items per page.
    responses:
      "200":
        description: Liked songs retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/PageResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
