# Like endpoints from LikeController

Like:
  post:
    tags: 
      - Likes
    summary: Like a song or playlist
    description: >-
      Creates a formal "like" association between the authenticated user and a distinct target entity (A Song or a Playlist module).
      Returns an HTTP 409 Conflict if attempting to duplicate a pre-existing like association.
      Requires a valid JWT token.
    operationId: like
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/LikeRequest.yml'
    responses:
      '200':
        description: Target successfully liked.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/LikeResponse.yml'
      '400':
        description: Request validation failed.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Intercepted - Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Target mapping entity not localized.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '409':
        description: Conflict overlap — Target asset already bears user's like.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

Unlike:
  delete:
    tags: 
      - Likes
    summary: Remove a like from an entity
    description: >-
      Severs and removes an existing like alignment from a specific song or playlist index. 
      The authenticated entity context can solely detach the likes originating from themselves. 
      Requires a valid JWT payload.
    operationId: unlike
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Canonical Like UUID or corresponding index ID.
    responses:
      '200':
        description: Like effectively reversed.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Verification framework block — Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Blocked — Action originator is not the like entity anchor.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Specified like entity could not be traced.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
