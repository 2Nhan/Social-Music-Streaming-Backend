      This endpoint returns `data = null` on success.
    operationId: likeSongV2
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "200":
        description: Song liked successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
