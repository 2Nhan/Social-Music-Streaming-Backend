# Repost endpoints from RepostController

SongRepost:
  post:
    tags: 
      - Reposts
    summary: Repost a song to user profile
    description: >-
      Creates a repost record allowing the authenticated user to share a song on their profile. 
      Returns an HTTP 409 Conflict if the song is already reposted. 
      Requires a valid JWT token.
    operationId: repost
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Target song ID to repost.
    responses:
      '200':
        description: Reposted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/RepostResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '409':
        description: Already reposted.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  delete:
    tags: 
      - Reposts
    summary: Remove a song repost
    description: >-
      Deletes an existing repost record, removing the song from the user's reposted collection.
      Only the authenticated user who reposted the song can remove it.
      Requires a valid JWT token.
    operationId: unrepost
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Target song ID to remove repost.
    responses:
      '200':
        description: Unreposted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Target song or repost record not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
