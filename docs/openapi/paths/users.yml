# User endpoints from UserController

UserById:
  get:
    tags: 
      - Users
    summary: Retrieve public user profile
    description: >-
      Fetches the public profile details of a user, including counts of followers, following, and public playlists.
      Does not require authentication.
    operationId: getUserById
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Targeted User ID.
    responses:
      '200':
        description: User profile successfully retrieved.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/UserProfileResponse.yml'
      '404':
        description: User not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  put:
    tags: 
      - Users
    summary: Update user public profile
    description: >-
      Modifies user profile attributes such as display name, avatar, and background image. 
      Only the authenticated user is permitted to update their own profile. 
      Requires a valid JWT token.
    operationId: updateProfile
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Targeted User ID.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/UpdateProfileRequest.yml'
    responses:
      '200':
        description: Profile updated successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/UserProfileResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Access denied — not the assigned profile owner.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: User not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

UserSongs:
  get:
    tags: 
      - Users
    summary: List a user's uploaded songs
    description: >-
      Retrieves a paginated list of all valid songs explicitly uploaded by a specific user. 
      Supports customizable sorting (e.g., sort by latest upload or most plays). 
      Public endpoint, no authentication required.
    operationId: getUserSongs
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Targeted User ID.
      - in: query
        name: page
        schema:
          type: integer
          default: 0
        description: Page number for pagination (0-indexed).
      - in: query
        name: size
        schema:
          type: integer
          default: 20
        description: Number of items rendered per page.
      - in: query
        name: sort
        schema:
          type: string
          default: 'createdAt,desc'
        description: >-
          Sort field and operational direction. Format: `field,direction`
          (e.g., `createdAt,desc` or `title,asc`).
    responses:
      '200':
        description: Paginated list of user's songs.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: '../components/schemas/response/PageResponse.yml'
                        - type: object
                          properties:
                            content:
                              type: array
                              items:
                                $ref: '../components/schemas/response/SongDetailResponse.yml'
      '404':
        description: Subject User not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

