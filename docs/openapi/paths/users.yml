# User endpoints from UserController

UserById:
  get:
    tags: [Users]
    summary: Get user profile by id
    description: Retrieve a public user profile.
    operationId: getUserById
    security: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User id.
    responses:
      "200":
        description: User profile retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/UserProfileResponse.yml"
      "404":
        description: User not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
  put:
    tags: [Users]
    summary: Update user profile
    description: Update profile information of the authenticated user.
    operationId: updateProfile
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User id.
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "../components/schemas/request/UpdateProfileRequest.yml"
    responses:
      "200":
        description: Profile updated successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/UserProfileResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "403":
        description: Access denied.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: User not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

UserSongs:
  get:
    tags: [Users]
    summary: Get songs uploaded by user
    description: >-
      Retrieve songs uploaded by a user with pagination and sort.
      This endpoint is public. If Authorization Bearer token is provided,
      each song includes user-specific `isFavorited`; otherwise `isFavorited` is null.
    operationId: getUserSongs
    security: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User id.
      - in: query
        name: page
        schema:
          type: integer
          default: 0
        description: Page number (0-indexed).
      - in: query
        name: size
        schema:
          type: integer
          default: 20
        description: Number of items per page.
      - in: query
        name: sort
        schema:
          type: string
          default: createdAt,desc
        description: Sort format field,direction.
    responses:
      "200":
        description: User songs retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: "../components/schemas/response/PageResponse.yml"
                        - type: object
                          properties:
                            content:
                              type: array
                              items:
                                $ref: "../components/schemas/response/SongResponse.yml"
      "404":
        description: User not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

