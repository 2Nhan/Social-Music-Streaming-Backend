# Comment endpoints from CommentController

SongComments:
  get:
    tags: 
      - Comments
    summary: Retrieve paginated comments for a song
    description: >-
      Fetches a paginated chronological array of comments associated with a specific song. 
      Does not require authentication, but demands a valid song target ID.
    operationId: getSongComments
    security:
      - BearerAuth: []
      - {}
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: The song ID for which to retrieve comments.
      - in: query
        name: page
        schema:
          type: integer
          default: 0
        description: Page number for pagination (0-indexed).
      - in: query
        name: size
        schema:
          type: integer
          default: 20
        description: Number of comment items rendered per page.
    responses:
      '200':
        description: Paginated list of target comments.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: '../components/schemas/response/PageResponse.yml'
                        - type: object
                          properties:
                            content:
                              type: array
                              items:
                                $ref: '../components/schemas/response/CommentResponse.yml'
      '404':
        description: Parent Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  post:
    tags: 
      - Comments
    summary: Publish a new comment on a song
    description: >-
      Persists a new user-authored text comment against a specific song entity. 
      The authenticated active user context is mapped directly as the comment author. 
      Requires a valid JWT token.
    operationId: addComment
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: The destination song ID.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/CommentRequest.yml'
    responses:
      '200':
        description: Comment persisted and attached to song successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/CommentResponse.yml'
      '400':
        description: Validation framework failed - text payload constraints violated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Unauthenticated request block.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Target song omitted or missing.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

DeleteComment:
  delete:
    tags: 
      - Comments
    summary: Delete a specific comment
    description: >-
      Removes a comment record from the database. 
      Only the author of the comment is administratively allowed to trigger this deletion procedure. 
      Requires a valid JWT token.
    operationId: deleteComment
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Target specific Comment ID block.
    responses:
      '200':
        description: Comment deleted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Unauthenticated constraint violation.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Access block trigger — actor is not the comment owner.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Targeted comment record not discovered.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
