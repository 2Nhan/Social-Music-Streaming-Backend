# Comment endpoints from CommentController

SongComments:
  get:
    tags: [Comments]
    summary: Get paginated comments for a song
    operationId: getSongComments
    security:
      - BearerAuth: []
      - {}
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song ID.
      - in: query
        name: page
        schema:
          type: integer
          default: 0
        description: Page number (0-indexed).
      - in: query
        name: size
        schema:
          type: integer
          default: 20
        description: Number of items per page.
    responses:
      '200':
        description: Paginated list of comments.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: '../components/schemas/response/PageResponse.yml'
                        - type: object
                          properties:
                            content:
                              type: array
                              items:
                                $ref: '../components/schemas/response/CommentResponse.yml'
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  post:
    tags: [Comments]
    summary: Add a comment to a song
    operationId: addComment
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song ID.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/CommentRequest.yml'
    responses:
      '200':
        description: Comment added successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/CommentResponse.yml'
      '400':
        description: Validation failed.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

DeleteComment:
  delete:
    tags: [Comments]
    summary: Delete a comment
    operationId: deleteComment
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Comment ID.
    responses:
      '200':
        description: Comment deleted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Access denied — not the comment owner.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Comment not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
