# Follow endpoints from FollowController

FollowUser:
  post:
    tags: 
      - Follow
    summary: Follow a specific user
    description: >-
      Establishes a unidirectional following linkage where the currently authenticated profile engages a 'follow' upon a distinct target destination user. 
      Fires a 409 Conflict rejection if the link state has previously been established. 
      Requires valid JWT session data.
    operationId: followUser
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: string
        description: ID index mapping to the destination profile to follow.
    responses:
      '200':
        description: User profile successfully followed.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Session absent or broken.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Assumed destination user lookup failed.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '409':
        description: Status rejection - relationship constraint already existing.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  delete:
    tags: 
      - Follow
    summary: Unfollow a specific user
    description: >-
      Removes the tracking link bridging the authenticated source user and a specific distinct outbound user account. 
      Requires valid JWT authorization scope.
    operationId: unfollowUser
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: string
        description: ID footprint indexing the user being unfollowed.
    responses:
      '200':
        description: Target profile no longer actively followed.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Intercept protocol - invalid authentication parameter.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: System cannot locate user matrix or preexisting link element to discard.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
