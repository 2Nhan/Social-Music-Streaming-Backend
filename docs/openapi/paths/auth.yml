# Auth endpoints from AuthController

Register:
  post:
    tags: [Auth]
    summary: Register a new user
    operationId: register
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/RegisterRequest.yml"
    responses:
      "200":
        description: Registered successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/AuthResponse.yml"
      "400":
        description: Validation failed.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "409":
        description: Duplicate email or username.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

Login:
  post:
    tags: [Auth]
    summary: Log in
    operationId: login
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/LoginRequest.yml"
    responses:
      "200":
        description: Logged in successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/AuthResponse.yml"
      "400":
        description: Validation failed.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

Refresh:
  post:
    tags: [Auth]
    summary: Refresh access token
    operationId: refresh
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/RefreshTokenRequest.yml"
    responses:
      "200":
        description: Token refreshed.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/AuthResponse.yml"
      "400":
        description: Validation failed or refresh token invalid.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

Logout:
  post:
    tags: [Auth]
    summary: Log out
    operationId: logout
    security:
      - BearerAuth: []
    parameters:
      - in: header
        name: Authorization
        required: false
        schema:
          type: string
        description: Bearer access token. Format Bearer <token>.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/RefreshTokenRequest.yml"
    responses:
      "200":
        description: Logged out successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      "400":
        description: Validation failed.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
