# Playlist endpoints from PlaylistController

PlaylistCollection:
  get:
    tags: [Playlists]
    summary: Get playlists created by authenticated user
    operationId: getAllPlaylist
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 0
        description: Page number (0-indexed).
      - in: query
        name: size
        schema:
          type: integer
          default: 10
        description: Number of items per page.
    responses:
      "200":
        description: User playlists retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: "../components/schemas/response/PageResponse.yml"
                        - type: object
                          properties:
                            content:
                              type: array
                              items:
                                $ref: "../components/schemas/response/PlaylistResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
  post:
    tags: [Playlists]
    summary: Create a playlist
    operationId: createPlaylist
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/PlaylistRequest.yml"
    responses:
      "200":
        description: Playlist created successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/PlaylistResponse.yml"
      "400":
        description: Validation failed.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

