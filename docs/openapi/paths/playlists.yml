PlaylistById:
  get:
    tags: [Playlists]
    summary: Get playlist by id
    operationId: getPlaylistById
    security: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Playlist id.
    responses:
      "200":
        description: Playlist retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/PlaylistResponse.yml"
      "404":
        description: Playlist not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

  put:
    tags: [Playlists]
    summary: Update a playlist
    operationId: updatePlaylist
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Playlist id.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/PlaylistRequest.yml"
    responses:
      "200":
        description: Playlist updated successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/PlaylistResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "403":
        description: Access denied.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: Playlist not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
  delete:
    tags: [Playlists]
    summary: Delete a playlist
    operationId: deletePlaylist
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Playlist id.
    responses:
      "200":
        description: Playlist deleted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "403":
        description: Access denied.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: Playlist not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

