# Playlist endpoints from PlaylistController

PlaylistCollection:
  post:
    tags: 
      - Playlists
    summary: Create a newly structured custom playlist
    description: >-
      Generates an empty structured playlist block tied unconditionally to the authorized user space as owner index. 
      Customizable layout parameters such as 'Visibility' (Private/Public) denote logical accessibility checks to other generic users. 
      Requires valid JWT token.
    operationId: createPlaylist
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/PlaylistRequest.yml'
    responses:
      '200':
        description: Playlist properly configured and constructed.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/PlaylistResponse.yml'
      '400':
        description: Parameter structure failure.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Unauthenticated gateway restriction.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

PlaylistById:
  get:
    tags: 
      - Playlists
    summary: Retrieve designated playlist details
    description: >-
      Requests deep property fetches including linked tracks mapping onto a localized playlist construct. 
      Visibility matrices are strictly parsed—calls invoking a hidden private list mandate identical JWT profile bindings against list owner profiles. 
    operationId: getPlaylistById
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The unique identifier tied directly to the playlist.
    responses:
      '200':
        description: Successfully pulled structured details array.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/PlaylistResponse.yml'
      '404':
        description: Playlist abstract deleted or invalid.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  put:
    tags: 
      - Playlists
    summary: Rewrite mapped playlist metadata structures
    description: >-
      Commits modifications onto dynamic title scopes, descriptions, or public-facing visibility parameters mapped on a playlist index. 
      A rigid authority check asserts modification requests belong wholly to the playlist owner node. 
      Demands valid user JWT payloads.
    operationId: updatePlaylist
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Active ID node footprint of target list block.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/PlaylistRequest.yml'
    responses:
      '200':
        description: Configuration patch complete.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/PlaylistResponse.yml'
      '401':
        description: Validation fault—token not captured.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Refusal override—user holds no ownership properties upon record.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Playlist index absent from system.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  delete:
    tags: 
      - Playlists
    summary: Delete an embedded playlist construct completely
    description: >-
      Nullifies all logical track mappings and entirely removes the internal relational structural playlist frame from core schemas. 
      Deletion checks strict security verification tying origin tokens to the explicit profile owner tag.
      Demands authenticated JWT payload transmission.
    operationId: deletePlaylist
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Target structure deletion ID.
    responses:
      '200':
        description: Entire payload index and map records eradicated.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Reject error due to token payload exclusion constraint limits.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Explicit block override on missing profile ownership logic.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Targeted element already dropped or falsely routed index mapping points limits.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

PlaylistSongs:
  post:
    tags: 
      - Playlists
    summary: Push an active song frame to a localized playlist
    description: >-
      Mounts an established audio entity linkage onto the designated array block list. 
      Automated overlap logic catches redundancy firing a 409 status error code upon encountering pre-positioned duplicate list tracks. 
      Strict constraints restrict these parameter allocations uniquely to authenticated profile owners.
    operationId: addSongToPlaylist
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: ID index target playlist vector.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/AddSongToPlaylistRequest.yml'
    responses:
      '200':
        description: Track reference correctly assigned.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/PlaylistResponse.yml'
      '400':
        description: Internal request payload structure error.
        content:
          application/json:
