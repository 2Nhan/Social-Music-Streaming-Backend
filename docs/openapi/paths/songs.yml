# Song endpoints from SongController and HlsController

SongsCollection:
  get:
    tags: [Songs]
    summary: Get all songs
    description: Retrieve a paginated list of songs.
    operationId: getAllSongs
    security: []
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 0
        description: Page number (0-indexed).
      - in: query
        name: size
        schema:
          type: integer
          default: 20
        description: Number of items per page.
    responses:
      "200":
        description: Songs retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      allOf:
                        - $ref: "../components/schemas/response/PageResponse.yml"
                        - type: object
                          properties:
                            content:
                              type: array
                              items:
                                $ref: "../components/schemas/response/SongResponse.yml"

UploadSong:
  post:
    tags: [Songs]
    summary: Upload a song
    description: Upload a song using multipart/form-data.
    operationId: uploadSong
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: "../components/schemas/request/SongUploadRequest.yml"
    responses:
      "200":
        description: Song uploaded successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      "400":
        description: Validation failed.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

SongById:
  get:
    tags: [Songs]
    summary: Get song by id
    description: Retrieve details for a specific song.
    operationId: getSongById
    security: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "200":
        description: Song retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/SongResponse.yml"
      "404":
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
  put:
    tags: [Songs]
    summary: Update song metadata
    description: Update metadata of a song owned by the authenticated user.
    operationId: updateSong
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Song id.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/request/SongUpdateRequest.yml"
    responses:
      "200":
        description: Song updated successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/SongResponse.yml"
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "403":
        description: Access denied.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
  delete:
    tags: [Songs]
    summary: Delete a song
    description: Delete a song owned by the authenticated user.
    operationId: deleteSong
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "200":
        description: Song deleted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      "401":
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "403":
        description: Access denied.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
      "404":
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

StreamHls:
  get:
    tags: [Songs]
    summary: Stream song via HLS
    description: Redirect to HLS master playlist URL.
    operationId: streamHls
    security: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "302":
        description: Redirect to HLS URL.
        headers:
          Location:
            schema:
              type: string
              format: uri
            description: HLS master playlist URL.
      "404":
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"

SongView:
  patch:
    tags: [Songs]
    summary: Increase song view count
    description: Increase view count for a song and return the updated song.
    operationId: increaseSongView
    security: []
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: Song id.
    responses:
      "200":
        description: Song view increased successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/response/ApiResponse.yml"
                - type: object
                  properties:
                    data:
                      $ref: "../components/schemas/response/SongResponse.yml"
      "404":
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: "../components/schemas/response/ErrorResponse.yml"
