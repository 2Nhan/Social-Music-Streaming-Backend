# Song endpoints from SongController & HlsController

UploadSong:
  post:
    tags: 
      - Songs
    summary: Upload a new standard audio song
    description: >-
      Uploads a standard audio file (e.g., MP3) via multipart form data.
      The authenticated user will automatically be set as the uploader and owner of the song. 
      Requires a valid JWT token.
    operationId: uploadSong
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas/request/SongUploadRequest.yml'
    responses:
      '200':
        description: Song uploaded successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '400':
        description: Validation failed or invalid input.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '500':
        description: File processing error.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

UploadSongV2:
  post:
    tags: 
      - Songs
    summary: Upload and process a song via HLS pipeline
    description: >-
      Uploads an audio file and triggers the automated V2 processing pipeline to convert 
      the audio into HTTP Live Streaming (HLS) format for adaptive bitrate streaming. 
      The authenticated user is set as the uploader. Requires a valid JWT token.
    operationId: uploadSongV2
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas/request/SongUploadRequest.yml'
    responses:
      '200':
        description: Song uploaded successfully into V2 pipeline.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '400':
        description: Validation failed or invalid input.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '500':
        description: File processing error.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

SongById:
  get:
    tags: 
      - Songs
    summary: Retrieve full song details
    description: >-
      Fetches complete metadata, play counts, and metrics for a specific song. 
      If the user provides a valid JWT token, contextual data (such as whether the current user liked the song) is also evaluated and returned.
      Can be accessed publicly without authentication.
    operationId: getSongById
    security:
      - BearerAuth: []
      - {}
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The unique identifier of the desired song.
    responses:
      '200':
        description: Song details retrieved successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/SongDetailResponse.yml'
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  put:
    tags: 
      - Songs
    summary: Update song metadata
    description: >-
      Modifies metadata (e.g., title, genre, visibility) for an existing song. 
      Only the original uploader (owner) of the song is authorized to perform this modification. 
      Requires a valid JWT token.
    operationId: updateSong
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The unique identifier of the song to update.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/request/SongUpdateRequest.yml'
    responses:
      '200':
        description: Song updated successfully. Returns updated song payload.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      $ref: '../components/schemas/response/SongDetailResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Access denied — User is not the owner of the song.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
  delete:
    tags: 
      - Songs
    summary: Hard delete a song
    description: >-
      Permanently deletes a song entity and removes its associated media files and metadata. 
      Only the original uploader of the song is authorized to execute this endpoint.
      Requires a valid JWT token.
    operationId: deleteSong
    security:
      - BearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The unique identifier of the song to delete.
    responses:
      '200':
        description: Song deleted successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '403':
        description: Access denied — User is not the owner of the song.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

StreamHls:
  get:
    tags: 
      - Songs
    summary: Get HLS master playlist URL
    description: >-
      Retrieves or redirects to the M3U8 master playlist file required to stream the song using HTTP Live Streaming (HLS) technology.
      Can be accessed publicly or with auth.
    operationId: streamHls
    security:
      - BearerAuth: []
      - {}
    parameters:
      - in: path
        name: songId
        required: true
        schema:
          type: string
        description: The unique identifier of the song to stream.
    responses:
      '302':
        description: Redirect to the HLS master playlist URL.
        headers:
          Location:
            schema:
              type: string
              format: uri
            description: Direct Cloud/S3 URL to the HLS master playlist (.m3u8).
      '404':
        description: Song not found.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
