# Song endpoints from SongController & HlsController

UploadSong:
  post:
    tags: [Songs]
    summary: Upload a new song
    operationId: uploadSong
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            $ref: '../components/schemas/request/SongUploadRequest.yml'
    responses:
      '200':
        description: Song uploaded successfully.
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/response/ApiResponse.yml'
                - type: object
                  properties:
                    data:
                      nullable: true
                      example: null
      '400':
        description: Validation failed or invalid input.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '401':
        description: Unauthenticated.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'
      '500':
        description: File processing error.
        content:
          application/json:
            schema:
              $ref: '../components/schemas/response/ErrorResponse.yml'

